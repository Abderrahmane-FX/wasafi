<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مؤقتات المهام التصاعدية</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --accent-color: #4f46e5;
            --accent-hover: #6366f1;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --danger-color: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .input-section {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #374151;
            background-color: #111827;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            background-color: var(--accent-color);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        .timers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .timer-card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            border-top: 4px solid var(--accent-color);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .timer-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            word-break: break-word;
        }

        .time-display {
            font-family: monospace;
            font-size: 1.4rem;
            color: #34d399;
            direction: ltr;
            text-align: center;
            background: #111827;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .timer-date {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 15px;
        }

        .delete-btn {
            background-color: transparent;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
            padding: 6px 12px;
            font-size: 0.9rem;
            border-radius: 6px;
        }

        .delete-btn:hover {
            background-color: var(--danger-color);
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⏱️ نظام المؤقتات التصاعدية المستمرة</h1>
    
    <div class="input-section">
        <input type="text" id="timerName" placeholder="اكتب اسم المؤقت الجديد هنا... (مثال: تحدي الالتزام)">
        <button onclick="createNewTimer()">بدء المؤقت</button>
    </div>

    <div class="timers-grid" id="timersContainer"></div>
</div>

<script>
    // تحميل المؤقتات المحفوظة من الذاكرة المحلية عند فتح الصفحة
    let timers = JSON.parse(localStorage.getItem('chronoTimers')) || [];

    function saveTimers() {
        localStorage.setItem('chronoTimers', JSON.stringify(timers));
    }

    function createNewTimer() {
        const input = document.getElementById('timerName');
        const name = input.value.trim();
        
        if (name === '') {
            alert('الرجاء إدخال اسم للمؤقت أولاً!');
            return;
        }

        const newTimer = {
            id: Date.now(),
            name: name,
            startTime: new Date().getTime() // يخزن لحظة البداية بالملي ثانية
        };

        timers.push(newTimer);
        saveTimers();
        renderTimers();
        input.value = '';
    }

    function deleteTimer(id) {
        if(confirm('هل أنت متأكد من حذف هذا المؤقت؟')) {
            timers = timers.filter(timer => timer.id !== id);
            saveTimers();
            renderTimers();
        }
    }

    function formatTime(ms) {
        let seconds = Math.floor(ms / 1000);
        let minutes = Math.floor(seconds / 60);
        let hours = Math.floor(minutes / 60);
        let days = Math.floor(hours / 24);

        seconds %= 60;
        minutes %= 60;
        hours %= 24;

        // إضافة صفر على اليسار إذا كان الرقم أقل من 10 لتناسق الشكل
        const d = days;
        const h = String(hours).padStart(2, '0');
        const m = String(minutes).padStart(2, '0');
        const s = String(seconds).padStart(2, '0');

        return `${d}d : ${h}h : ${m}m : ${s}s`;
    }

    function updateDisplays() {
        const now = new Date().getTime();
        timers.forEach(timer => {
            const displayElement = document.getElementById(`display-${timer.id}`);
            if (displayElement) {
                const diff = now - timer.startTime;
                displayElement.innerText = formatTime(diff);
            }
        });
    }

    function renderTimers() {
        const container = document.getElementById('timersContainer');
        container.innerHTML = '';

        timers.forEach(timer => {
            const startDate = new Date(timer.startTime).toLocaleString('ar-EG', {
                hour12: true,
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });

            const card = document.createElement('div');
            card.className = 'timer-card';
            card.innerHTML = `
                <div class="timer-title">${timer.name}</div>
                <div class="time-display" id="display-${timer.id}">0d : 00h : 00m : 00s</div>
                <div class="timer-date">بدأ في: ${startDate}</div>
                <button class="delete-btn" onclick="deleteTimer(${timer.id})">حذف المؤقت</button>
            `;
            container.appendChild(card);
        });
        
        // تحديث فوري للأرقام بعد الرندرة
        updateDisplays();
    }

    // تحديث العدادات كل ثانية واحدة
    setInterval(updateDisplays, 1000);

    // تشغيل النظام عند فتح الصفحة لأول مرة
    renderTimers();
</script>

</body>
</html>
